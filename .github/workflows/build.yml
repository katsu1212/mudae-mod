name: Build Mudae Mod

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew || true

      - name: Get version
        id: version
        run: echo "VERSION=$(grep "^version" build.gradle | head -1 | sed "s/version = '//;s/'//")" >> $GITHUB_OUTPUT

      - name: Build with Gradle
        run: ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx3g"

      - name: Upload mod JAR (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: mudaemod-jar
          path: build/libs/mudaemod-*.jar
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "Mudae Mod v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Mudae Mod v${{ steps.version.outputs.VERSION }}

            Colecciona waifus y husbandos de anime en Minecraft!

            ### Instalación
            1. Instalá **NeoForge 1.21.1**
            2. Copiá el `.jar` a la carpeta `mods`
            3. Click derecho en la **Terminal de Mudae** para invocar personajes

            ### Esta versión incluye
            - 367 personajes (174 waifus + 193 husbandos)
            - Rolls por chat: `$w` waifu · `$h` husbando · `$claim` · `$kakera`
            - 16 rolls/hora · 1 claim cada 2 horas · pool global compartida
            - Terminal muestra tu harem con botón Vender
            - Tienda de stats con kakera: Vida · Velocidad · Fuerza · Defensa
          files: build/libs/mudaemod-*.jar
          make_latest: true
